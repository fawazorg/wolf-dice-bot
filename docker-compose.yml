# ==============================================================================
# Docker Compose Configuration - Wolf Dice Bot
# ==============================================================================
# Version: 2.0 (Compose Spec - 2025 Best Practices)
# Project: wolf-dice-bot
#
# Usage:
#   Start:    docker compose up -d
#   Stop:     docker compose down
#   Logs:     docker compose logs -f [service]
#   Clean:    docker compose down -v
#
# Requirements:
#   - Docker Engine 24.0+
#   - .env file configured
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # MongoDB Database Service
  # ----------------------------------------------------------------------------
  mongodb:
    image: mongo:${MONGO_VERSION:-8.0}
    container_name: ${COMPOSE_PROJECT_NAME:-wolf-dice}-mongodb
    hostname: mongodb
    restart: ${RESTART_POLICY:-unless-stopped}

    environment:
      # Root credentials
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-admin}

      # App credentials (for init script)
      MONGO_APP_USERNAME: ${MONGO_USER}
      MONGO_APP_PASSWORD: ${MONGO_PWD}
      MONGO_APP_DATABASE: ${MONGO_DB_NAME}

    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"

    volumes:
      - wolf-dice-mongodb-data:/data/db
      - wolf-dice-mongodb-config:/data/configdb
      - ./docker/mongodb/init-db.sh:/docker-entrypoint-initdb.d/10-init-user.sh:ro

    networks:
      - wolf-dice-network

    healthcheck:
      test: mongosh --quiet --eval "db.adminCommand('ping').ok" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: "${MONGO_CPU_LIMIT:-1.0}"
          memory: ${MONGO_MEMORY_LIMIT:-512M}
        reservations:
          cpus: "${MONGO_CPU_RESERVE:-0.25}"
          memory: ${MONGO_MEMORY_RESERVE:-256M}

    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

    security_opt:
      - no-new-privileges:true

    init: true

  # ----------------------------------------------------------------------------
  # Redis Cache Service
  # ----------------------------------------------------------------------------
  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-wolf-dice}-redis
    hostname: redis
    restart: ${RESTART_POLICY:-unless-stopped}

    command:
      - redis-server
      - --maxmemory
      - ${REDIS_MAX_MEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "60"
      - "1000"
      - --appendonly
      - ${REDIS_AOF_ENABLED:-yes}
      - --appendfsync
      - everysec

    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

    volumes:
      - wolf-dice-redis-data:/data

    networks:
      - wolf-dice-network

    healthcheck:
      test: redis-cli --no-auth-warning ${REDIS_PASSWORD:+--pass $REDIS_PASSWORD} ping | grep -q PONG || exit 1
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: ${REDIS_MEMORY_LIMIT:-256M}
        reservations:
          cpus: "${REDIS_CPU_RESERVE:-0.1}"
          memory: ${REDIS_MEMORY_RESERVE:-128M}

    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

    security_opt:
      - no-new-privileges:true

    init: true

# ==============================================================================
# Network Configuration
# ==============================================================================
networks:
  wolf-dice-network:
    name: ${COMPOSE_PROJECT_NAME:-wolf-dice}-network
    driver: bridge
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET:-172.28.0.0/16}

# ==============================================================================
# Volume Configuration
# ==============================================================================
volumes:
  wolf-dice-mongodb-data:
    name: wolf-dice-mongodb-data

  wolf-dice-mongodb-config:
    name: wolf-dice-mongodb-config

  wolf-dice-redis-data:
    name: wolf-dice-redis-data
