keyword: dice
app:
  defaultLanguage: en
  developerId: 82366923
  commandSettings:
    ignoreOfficialBots: true
    ignoreUnofficialBots: true
  networkSettings:
    retryMode: 1
    retryAttempts: 1

admin:
  # Comma-separated list of admin user IDs
  # These users have elevated permissions to execute admin commands
  # Example: [12345678, 87654321]
  adminIds: [76117834]

  # Special admin channel ID for notifications and logs
  # Bot will send administrative notifications to this channel
  adminChannelId: 81967172

  # Comma-separated list of channel IDs to ignore in bot operations
  # These channels won't be auto-left due to inactivity
  # Example: [11111111, 22222222]
  ignoreChannelIds: []

redis:
  host: localhost
  port: 6379
