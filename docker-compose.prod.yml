# ==============================================================================
# Docker Compose Production Overrides
# ==============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ==============================================================================

services:
  mongodb:
    # Production: Don't expose MongoDB port to host
    ports: []

    # Stricter restart policy
    restart: always

    # Increased resources for production
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    # Production: Don't expose Redis port to host
    ports: []

    # Stricter restart policy
    restart: always

    # Increased resources for production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
